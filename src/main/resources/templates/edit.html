<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #1e90ff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>게시글 수정하기</h2>
    <form th:action="@{/post/edit}" method="post">
        
        <input type="hidden" name="id" th:value="${post.id}">

        <label>제목</label>
        <input type="text" name="title" th:value="${post.title}" required>

        <label>내용</label>
        <textarea name="content" rows="10" th:text="${post.content}" required></textarea>

        <button type="submit">수정 완료</button>
    </form>
</div>

</body>
</html>
