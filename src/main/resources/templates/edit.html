<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f6f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background-color: #1e90ff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .current-image { margin-bottom: 10px; }
        .current-image img { max-width: 150px; display: block; margin-top: 5px; border-radius: 5px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 게시글 수정하기</h2>
    <form th:action="@{/post/{id}/edit(id=${post.id})}" method="post" enctype="multipart/form-data">
        
        <input type="hidden" name="id" th:value="${post.id}">

        <label>카테고리</label>
        <select name="category" required>
            <option th:each="cat : ${categoryList}" 
                    th:value="${cat}" 
                    th:text="${cat}" 
                    th:selected="${cat == post.category}"></option>
        </select>

        <label>제목</label>
        <input type="text" name="title" th:value="${post.title}" required>

        <label>내용</label>
        <textarea name="content" rows="10" th:text="${post.content}" required></textarea>

        <div class="current-image" th:if="${post.imagePath != null and post.imagePath != ''}">
            <label>현재 등록된 이미지</label>
            <img th:src="${post.imagePath}" alt="기존 이미지">
        </div>

        <label>이미지 변경 (선택 사항)</label>
        <input type="file" name="imageFile" accept="image/*">

        <button type="submit">수정 완료</button>
    </form>
</div>

</body>
</html>
