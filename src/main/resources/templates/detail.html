<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세 보기</title>
    <style>
        body { font-family: 'Pretendard', Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-top: 10px; }
        .meta-info { color: #888; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; }
        .content-box { background: #f8f9fa; padding: 20px; border-radius: 5px; min-height: 100px; font-size: 16px; line-height: 1.6; color: #444; margin-bottom: 25px; }
        .status-area { margin-bottom: 25px; padding: 15px; background: #eef5fc; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .badge { color: white; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .bg-ing { background-color: #1e90ff; }
        .bg-done { background-color: #a0a0a0; }
        .uploaded-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        
        .comment-section { margin-top: 40px; padding-top: 20px; border-top: 2px solid #f0f0f0; }
        .comment-input-area { margin-top: 15px; display: flex; gap: 10px; }
        .comment-input-area textarea { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; resize: none; height: 60px; }
        .comment-input-area button { padding: 0 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        .comment-list { margin-top: 20px; }
        .comment-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: start; }
        .comment-meta { font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div>
        <span style="background: #1e90ff; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold;" th:text="${post.category}">카테고리</span>
    </div>
    <h1 th:text="${post.title}">글 제목</h1>
    
    <div class="meta-info">
        <span>작성자: <th:block th:text="${post.writer}"></th:block></span>
        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">시간</span>
    </div>

    <div class="content-box" th:text="${post.content}">내용</div>
    
    <div th:if="${post.imagePath != null and post.imagePath != ''}">
        <img th:src="${post.imagePath}" class="uploaded-img" alt="첨부 이미지">
    </div>

    <div class="status-area" th:if="${post.maxParticipants != null}">
        <div>
            <span style="font-weight: bold; color: #333;">👥 참여 인원 현황</span>
            <div style="font-size: 18px; font-weight: bold; color: #1e90ff;">
                <span th:text="${post.currentParticipants ?: 1}">1</span> / <span th:text="${post.maxParticipants}">5</span> 명
            </div>
        </div>
        <span class="badge" th:classappend="${post.status == '모집완료'} ? 'bg-done' : 'bg-ing'" th:text="${post.status}">상태</span>
    </div>

    <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="/" style="padding: 10px 20px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px;">⬅️ 목록</a>
        
        <th:block th:if="${#strings.startsWith(post.writer, loginId) or loginId == 'admin'}">
            <a th:href="@{'/post/' + ${post.id} + '/edit'}" style="padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px;">수정</a>
            <a th:href="@{'/post/' + ${post.id} + '/delete'}" onclick="return confirm('정말 삭제할까요?');" style="padding: 10px 20px; background: #dc3545; color: white; text-decoration: none; border-radius: 5px;">삭제</a>
        </th:block>
        
        <th:block th:unless="${#strings.startsWith(post.writer, loginId) or loginId == 'admin'}">
            <form th:if="${post.status == '모집중'}" th:action="@{'/post/' + ${post.id} + '/join'}" method="post">
                <button type="submit" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">🚀 참여 신청</button>
            </form>
        </th:block>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <form th:action="@{'/post/' + ${post.id} + '/like'}" method="post">
            <button type="submit" style="padding: 10px 20px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer;">
                <span th:text="${isLiked} ? '❤️ 좋아요 취소' : '🤍 좋아요'">좋아요</span>
                <span th:text="${likesCount}">0</span>
            </button>
        </form>
        <button onclick="copyUrl()" style="padding: 10px 20px; background: #2ed573; color: white; border: none; border-radius: 5px; cursor: pointer;">🔗 주소 복사</button>
    </div>

    <div class="comment-section">
        <h3>💬 댓글</h3>
        <form th:action="@{'/post/' + ${post.id} + '/comment'}" method="post" class="comment-input-area">
            <textarea name="content" required placeholder="댓글을 입력하세요..."></textarea>
            <button type="submit">등록</button>
        </form>

        <div class="comment-list">
            <div th:each="comment : ${comments}" class="comment-item">
                <div style="flex-grow: 1;">
                    <div class="comment-meta">
                        <span th:text="${comment.user.studentId} + ' (' + ${comment.user.name} + ')'">작성자</span> | 
                        <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">시간</span>
                    </div>
                    <p th:text="${comment.content}" style="margin: 0;"></p>
                </div>
                <form th:action="@{/post/{id}/comment/{commentId}/delete(id=${post.id}, commentId=${comment.id})}" method="post">
                    <button type="submit" style="color: #ff6b6b; background: none; border: none; cursor: pointer; font-size: 12px;">삭제</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function copyUrl() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("링크 복사 완료!"));
    }
</script>
</body>
</html>
