<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>한국공학대학교 커뮤니티 - 로그인</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        h1 { color: #333; margin-bottom: 8px; font-size: 26px; }
        p { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        .btn-login { width: 100%; padding: 12px; background-color: #1e90ff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-login:hover { background-color: #1170cd; }
        .error-msg { color: #ff4757; font-size: 13px; margin-bottom: 15px; font-weight: bold; text-align: left; }
    </style>
</head>
<body>

<div class="login-container">
    <h1>🏫 한국공학대학교</h1>
    <p>학생 인증 커뮤니티 로그인</p>
    
    <form action="/login" method="POST">
        <div class="error-msg" th:if="${loginError}">
            ❌ 학번 또는 비밀번호가 일치하지 않습니다.
        </div>

        <div class="form-group">
            <label>👤 학번 (Student ID)</label>
            <input type="text" name="studentId" placeholder="학번을 입력하세요 (예: 202612345)" required>
        </div>
        
        <div class="form-group">
            <label>🔒 비밀번호 (Password)</label>
            <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        
        <button type="submit" class="btn-login">인증 및 로그인하기 🚀</button>
    </form>
</div>

</body>
</html>
